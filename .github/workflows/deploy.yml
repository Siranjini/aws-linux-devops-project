name: GitHub Actions for EC2 deployment

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          port: 22
          script: |
            if [ -d "/home/ubuntu/aws-linux-devops-project" ]; then
              cd /home/ubuntu/aws-linux-devops-project
              git pull origin main
            else
              cd /home/ubuntu
              git clone https://github.com/Siranjini/aws-linux-devops-project.git
            fi
            sudo apt-get install nginx -y
            sudo cp /home/ubuntu/aws-linux-devops-project/index.html /var/www/html/index.html
            sudo nginx -t
            sudo systemctl start nginx
            sudo systemctl enable nginx
